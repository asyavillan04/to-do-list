<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <title>To Do List</title>

    <link rel="stylesheet" href="./styles/index.css"/>

    <script src="script.js" type="module"></script>
</head>
<body>
    <div class="todo" data-js-todo>

        <div class="todo_head">

            <div class="settings-dropdown" data-dropdown="lang">
                <button class="settings-dropdown__trigger"
                 aria-haspopup="true" 
                 aria-expanded="false"
                 type="button">
                    <span data-locale="currentLang">ENG</span>
                </button>

                <ul class="settings-dropdown__menu" hidden>
                    <button class="option" data-lang="en">
                        English
                        <img src="icons/usa-flag.svg" alt="English" width="40" height="30">
                    </button>

                    <button class="option" data-lang="ru">
                        Русский
                        <img src="icons/ru-flag.svg" alt="Русский" width="40" height="30">
                    </button>

                    <button class="option" data-lang="es">
                        Español
                        <img src="icons/esp-flag.svg" alt="Español" width="40" height="30">
                    </button>
                </ul>
            </div>


            <h1 class="todo_title" data-locale="title">To Do List</h1>

            <div class="settings-dropdown" data-dropdown="theme">
                <button class="settings-dropdown__trigger" 
                aria-haspopup="true" 
                aria-expanded="false"
                type="button">

                        <g clip-path="url(#clip0_2_21)">

                        </g>
                        <defs>
                        <clipPath id="clip0_2_21">
                        <rect width="36" height="36" fill="white"/>
                        </clipPath>
                        </defs>
                        </svg>
                </button>

                <ul class="settings-dropdown__menu" hidden>
                    <button class="option" data-theme="auto">
                        Auto
                        <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M25.5 18.6583C25.3689 20.0768 24.8366 21.4287 23.9652 22.5557C23.0939 23.6826 21.9196 24.5382 20.5798 25.0221C19.2399 25.5061 17.79 25.5984 16.3996 25.2884C15.0092 24.9784 13.7358 24.2788 12.7285 23.2715C11.7212 22.2642 11.0216 20.9908 10.7116 19.6004C10.4016 18.21 10.4939 16.7601 10.9779 15.4202C11.4618 14.0804 12.3174 12.9061 13.4444 12.0348C14.5713 11.1634 15.9232 10.6311 17.3417 10.5C16.5112 11.6236 16.1116 13.0079 16.2155 14.4012C16.3194 15.7945 16.9199 17.1042 17.9078 18.0922C18.8958 19.0801 20.2055 19.6807 21.5988 19.7846C22.9921 19.8885 24.3765 19.4888 25.5 18.6583Z" stroke="#1E1E1E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <g clip-path="url(#clip0_2_21)">
                        <path d="M18 1.5V4.5M18 31.5V34.5M6.33 6.33L8.46 8.46M27.54 27.54L29.67 29.67M1.5 18H4.5M31.5 18H34.5M6.33 29.67L8.46 27.54M27.54 8.46L29.67 6.33M25.5 18C25.5 22.1421 22.1421 25.5 18 25.5C13.8579 25.5 10.5 22.1421 10.5 18C10.5 13.8579 13.8579 10.5 18 10.5C22.1421 10.5 25.5 13.8579 25.5 18Z" stroke="#1E1E1E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </g>
                        <defs>
                        <clipPath id="clip0_2_21">
                        <rect width="36" height="36" fill="white"/>
                        </clipPath>
                        </defs>
                        </svg>

                    </button>

                    <button class="option" data-theme="light">
                        Day
                        <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <g clip-path="url(#clip0_2_19)">
                        <path d="M18 1.5V4.5M18 31.5V34.5M6.33 6.33L8.46 8.46M27.54 27.54L29.67 29.67M1.5 18H4.5M31.5 18H34.5M6.33 29.67L8.46 27.54M27.54 8.46L29.67 6.33M25.5 18C25.5 22.1421 22.1421 25.5 18 25.5C13.8579 25.5 10.5 22.1421 10.5 18C10.5 13.8579 13.8579 10.5 18 10.5C22.1421 10.5 25.5 13.8579 25.5 18Z" stroke="#1E1E1E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </g>
                        <defs>
                        <clipPath id="clip0_2_19">
                        <rect width="36" height="36" fill="white"/>
                        </clipPath>
                        </defs>
                        </svg>
                    </button>
                    <button class="option" data-theme="dark">
                        Night
                        <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M31.5 19.185C31.264 21.7383 30.3058 24.1716 28.7374 26.2002C27.169 28.2288 25.0552 29.7687 22.6436 30.6398C20.2319 31.5109 17.622 31.6772 15.1193 31.1191C12.6165 30.5611 10.3245 29.3018 8.51134 27.4887C6.69819 25.6755 5.43891 23.3835 4.88087 20.8807C4.32282 18.378 4.48908 15.7681 5.36019 13.3564C6.23131 10.9448 7.77125 8.83105 9.79982 7.26263C11.8284 5.69421 14.2617 4.73596 16.815 4.5C15.3201 6.5224 14.6008 9.01417 14.7878 11.5221C14.9748 14.0301 16.0558 16.3876 17.8341 18.1659C19.6124 19.9442 21.9699 21.0252 24.4779 21.2122C26.9858 21.3992 29.4776 20.6799 31.5 19.185Z" stroke="#1E1E1E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </ul>  

            </div>          

        </div>


    <form class="todo_form" data-js-todo-new-task-form>
        <div class="todo_field field">
            <label data-locale="newTaskLabel"
            for="new-task" 
                class="field_label">
                New task title
            </label>
            <input 
                class="field_input"
                id="new-task"
                placeholder=" "
                autocomplete="off"
                data-js-todo-new-task-input
            />

            </div>
            <button class="button" data-locale="addButton" type="submit">Add</button>
        </form>

        <form class="todo_form" data-js-todo-search-task-form>
            <div class="todo_field field">
                <label data-locale="searchLabel"
                for="search-task" 
                class="field_label">
                Search task
            </label>
            <input 
                class="field_input"
                id="search-task"
                placeholder=" "
                autocomplete="off"
                type="search"
                data-js-todo-search-task-input
            />

            </div>
        </form>

        <div class="todo_info">
            <div class="todo_total-tasks">
                <span data-js-todo-total-tasks>0</span>
            </div>
            <button class="todo_delete-all-button"
            type="button"
            data-locale="deleteAll"
            data-js-todo-delete-all-button
            >
            Delete All
            </button>
        </div>

        <ul class="todo_list" data-js-todo-list>

        </ul>
        <div class="todo_empty-message" data-locale="emptyList" data-js-todo-empty-message>
        </div>
    </div>
</body>
</html>
