<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <title>To Do List</title>

    <link rel="stylesheet" href="./styles/index.css"/>

    <script src="script.js" type="module"></script>
</head>
<body>
    <div class="todo" data-js-todo>
        <h1 class="todo_title">To Do List</h1>
        <form class="todo_form" data-js-todo-new-task-form>
            <div class="todo_field field">
                <label 
                for="new-task" 
                class="field_label">
                New task title
            </label>
            <input 
                class="field_input"
                id="new-task"
                placeholder=" "
                autocomplete="off"
                data-js-todo-new-task-input
            />

            </div>
            <button class="button" type="submit">Add</button>
        </form>

        <form class="todo_form" data-js-todo-search-task-form=>
            <div class="todo_field field">
                <label 
                for="search-task" 
                class="field_label">
                Search task
            </label>
            <input 
                class="field_input"
                id="search-task"
                placeholder=" "
                autocomplete="off"
                type="search"
                data-js-todo-search-task-input
            />

            </div>
        </form>

        <div class="todo_info">
            <div class="todo_total-tasks">
                Total tasks: <span data-js-todo-total-tasks>0</span>
            </div>
            <button class="todo_delete-all-button"
            type="button"
            data-js-todo-delete-all-button
            >
            Delete All
            </button>
        </div>

        <ul class="todo_list" data-js-todo-list>

        </ul>
        <div class="todo_empty-message" data-js-todo-empty-message>
        </div>
    </div>
</body>
</html>
