<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <title>To Do List</title>

    <link rel="stylesheet" href="./styles/index.css"/>

    <script src="script.js" type="module"></script>
</head>
<body>
    <div class="todo" data-js-todo>

        <div class="todo_head">

            <div class="settings-dropdown" data-dropdown="lang">
                <button class="settings-dropdown__trigger"
                 aria-haspopup="true" 
                 aria-expanded="false"
                 type="button">
                    <span data-locale="currentLang">ENG</span>
                </button>

                <ul class="settings-dropdown__menu" hidden>
                    <button class="option" data-lang="en">
                        English
                        <img src="icons/usa-flag.svg" alt="English" width="40" height="30">
                    </button>

                    <button class="option" data-lang="ru">
                        Русский
                        <img src="icons/ru-flag.svg" alt="Русский" width="40" height="30">
                    </button>

                    <button class="option" data-lang="es">
                        Español
                        <img src="icons/esp-flag.svg" alt="Español" width="40" height="30">
                    </button>
                </ul>
            </div>


            <h1 class="todo_title" data-locale="title">To Do List</h1>

            <div class="settings-dropdown" data-dropdown="theme">
                <button class="settings-dropdown__trigger" 
                aria-haspopup="true" 
                aria-expanded="false"
                type="button">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="currentColor">
                        <g id="outline">
                            <path d="M53.628,38.58A4.939,4.939,0,0,0,53,38.026V3a1,1,0,0,0-1.707-.707l-4,4A1,1,0,0,0,47,7V26.388A24,24,0,1,0,24,61.91V62H50a11.985,11.985,0,0,0,3.628-23.42Zm.377,6.97A5.924,5.924,0,0,1,56,50a6,6,0,0,1-12,0A5.924,5.924,0,0,1,46,45.55a29.072,29.072,0,0,0,3.224,5.075,1,1,0,0,0,1.562,0A29.072,29.072,0,0,0,54.005,45.55ZM49,7.414l2-2V9H49ZM49,11h2V37.1a5,5,0,0,0-2,0Zm1,28a3,3,0,0,1,3,3c0,1.743-1.762,4.6-3,6.334C48.762,46.6,47,43.746,47,42A3,3,0,0,1,50,39Zm0,21H25.728l-.686-.029A22,22,0,0,1,4.057,36.333,22.005,22.005,0,0,1,47,31.438v6.588A4.977,4.977,0,0,0,45,42a6.048,6.048,0,0,0,.248,1.584A7.906,7.906,0,0,0,42,50a8,8,0,0,0,16,0,7.906,7.906,0,0,0-3.248-6.416A6.048,6.048,0,0,0,55,42a4.9,4.9,0,0,0-.07-.69A9.993,9.993,0,0,1,50,60Z"></path>
                            <path d="M28,46a6,6,0,1,0,6,6A6.006,6.006,0,0,0,28,46Zm0,10a4,4,0,1,1,4-4A4,4,0,0,1,28,56Z"></path>
                            <path d="M15,41a6,6,0,1,0,6,6A6.006,6.006,0,0,0,15,41Zm0,10a4,4,0,1,1,4-4A4,4,0,0,1,15,51Z"></path>
                            <path d="M19,33a6,6,0,1,0-6,6A6.006,6.006,0,0,0,19,33ZM9,33a4,4,0,1,1,4,4A4,4,0,0,1,9,33Z"></path>
                            <path d="M25,31a6,6,0,1,0-6-6A6.006,6.006,0,0,0,25,31Zm0-10a4,4,0,1,1-4,4A4,4,0,0,1,25,21Z"></path>
                            <path d="M44,32a6,6,0,1,0-6,6A6.006,6.006,0,0,0,44,32Zm-6,4a4,4,0,1,1,4-4A4,4,0,0,1,38,36Z"></path>
                            <rect x="12" y="23" width="2" height="2"></rect><rect x="16" y="20" width="2" height="2"></rect>
                        </g></svg>
                </button>

                <ul class="settings-dropdown__menu" hidden>
                    <button class="option" data-theme="auto">
                        Auto
                        <img src="icons/theme-auto.svg" alt="" width="30px" height="30px">
                    </button>

                    <button class="option" data-theme="light">
                        Day
                        <img src="icons/theme-day.svg" alt="Day" width="30px" height="30px">
                    
                    </button>
                    <button class="option" data-theme="dark">
                        Night
                        <img src="icons/theme-night.svg" alt="Night" width="30px" height="30px">
                    </button>
                </ul>  

            </div>          

        </div>


    <form class="todo_form" data-js-todo-new-task-form>
        <div class="todo_field field">
            <label data-locale="newTaskLabel"
            for="new-task" 
                class="field_label">
                New task title
            </label>
            <input 
                class="field_input"
                id="new-task"
                placeholder=" "
                autocomplete="off"
                data-js-todo-new-task-input
            />

            </div>
            <button class="button" data-locale="addButton" type="submit">Add</button>
        </form>

        <form class="todo_form" data-js-todo-search-task-form>
            <div class="todo_field field">
                <label data-locale="searchLabel"
                for="search-task" 
                class="field_label">
                Search task
            </label>
            <input 
                class="field_input"
                id="search-task"
                placeholder=" "
                autocomplete="off"
                type="search"
                data-js-todo-search-task-input
            />

            </div>
        </form>

        <div class="todo_info">
            <div class="todo_total-tasks">
                <span data-js-todo-total-tasks>0</span>
            </div>
            <button class="todo_delete-all-button"
            type="button"
            data-locale="deleteAll"
            data-js-todo-delete-all-button
            >
            Delete All
            </button>
        </div>

        <ul class="todo_list" data-js-todo-list>

        </ul>
        <div class="todo_empty-message" data-locale="emptyList" data-js-todo-empty-message>
        </div>
    </div>
</body>
</html>
