<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <title>To Do List</title>

    <link rel="stylesheet" href="./styles/index.css"/>

    <script src="script.js" type="module"></script>
</head>
<body>
    <div class="todo" data-js-todo>
        <h1 class="todo_title">To Do List</h1>
        <form class="todo form" data-js-todo-new-task-form>
            <div class="todo_field field">
                <label 
                for="new-task" 
                class="field_label">
                New task title
            </label>
            <input 
                class="field_input"
                id="new-task"
                placeholder=" "
                autocomplete="off"
                data-js-todo-new-task-input
            />

            </div>
            <button class="button" type="submit">Add</button>
        </form>

        <form class="todo form" data-js-todo-search-task-form=>
            <div class="todo_field field">
                <label 
                for="search-task" 
                class="field_label">
                Search task
            </label>
            <input 
                class="field_input"
                id="search-task"
                placeholder=" "
                autocomplete="off"
                type="search"
                data-js-todo-search-task-input
            />

            </div>
        </form>

        <div class="todo_info">
            <div class="todo_total-tasks">
                Total tasks: <span data-js-todo-total-tasks>0</span>
            </div>
            <button class="todo_delete-all-button"
            type="button"
            data-js-todo-delete-all-button
            >
            Delete All
            </button>
        </div>

        <ul class="todo_list" data-js-todo-list>
            <li class="todo_item todo-item" data-js-todo-item>
                <input
                class="todo-item_checkbox"
                id="todo-1"
                type="checkbox"
                data-js-todo-item-checkbox
                />
                <label 
                    class="todo-item_label" 
                    for="todo-1" 
                    data-js-todo-item-label
                    >
                    Todo 1
                </label>
                <button 
                class="todo-item_delete-button" 
                type="button"
                aria-label="Delete"
                title="Delete"
                data-js-todo-item-delete-button
                >

                <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" id="Capa_1" x="0px" y="0px" viewBox="0 0 512.021 512.021" style="enable-background:new 0 0 512.021 512.021;" xml:space="preserve" width="512" height="512">
                <g>
                    <path d="M301.258,256.01L502.645,54.645c12.501-12.501,12.501-32.769,0-45.269c-12.501-12.501-32.769-12.501-45.269,0l0,0   L256.01,210.762L54.645,9.376c-12.501-12.501-32.769-12.501-45.269,0s-12.501,32.769,0,45.269L210.762,256.01L9.376,457.376   c-12.501,12.501-12.501,32.769,0,45.269s32.769,12.501,45.269,0L256.01,301.258l201.365,201.387   c12.501,12.501,32.769,12.501,45.269,0c12.501-12.501,12.501-32.769,0-45.269L301.258,256.01z"/>
                </g>
                </svg>

                </button>
            </li>
             <li class="todo_item todo-item" data-js-todo-item>
                <input
                class="todo-item_checkbox"
                id="todo-1"
                type="checkbox"
                data-js-todo-item-checkbox
                />
                <label 
                    class="todo-item_label" 
                    for="todo-1" 
                    data-js-todo-item-label
                    >
                    Todo 2
                </label>
                <button 
                class="todo-item_delete-button" 
                type="button"
                aria-label="Delete"
                title="Delete"
                data-js-todo-item-delete-button
                >
                <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" id="Capa_1" x="0px" y="0px" viewBox="0 0 512.021 512.021" style="enable-background:new 0 0 512.021 512.021;" xml:space="preserve" width="512" height="512">
                <g>
                    <path d="M301.258,256.01L502.645,54.645c12.501-12.501,12.501-32.769,0-45.269c-12.501-12.501-32.769-12.501-45.269,0l0,0   L256.01,210.762L54.645,9.376c-12.501-12.501-32.769-12.501-45.269,0s-12.501,32.769,0,45.269L210.762,256.01L9.376,457.376   c-12.501,12.501-12.501,32.769,0,45.269s32.769,12.501,45.269,0L256.01,301.258l201.365,201.387   c12.501,12.501,32.769,12.501,45.269,0c12.501-12.501,12.501-32.769,0-45.269L301.258,256.01z"/>
                </g>
                </svg>
                
                </button>
            </li>
        </ul>
        <div class="todo_empty-message" data-js-todo-empty-message>
        </div>
    </div>
</body>
</html>
